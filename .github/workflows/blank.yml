name: Mochi-1 (Zero-CLI 6GB Fix)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlx-video huggingface_hub Pillow mlx tqdm

      - name: Prepare Assets
        run: |
          curl -L -o raw.png "https://huggingface.co/datasets/huggingface/documentation-images/resolve/main/diffusers/svd/rocket.png"
          python3 -c "from PIL import Image; Image.open('raw.png').convert('RGB').resize((320, 320)).save('input.png')"

      - name: Inference (Direct Python Import)
        run: |
          python3 << 'EOF'
          import mlx.core as mx
          from mlx_video.mochi.generate import generate # Direct internal import
          
          print("Starting Mochi-1 Generation (6GB RAM Optimized)...")
          
          # We use the 4-bit preview model for absolute minimum RAM footprint
          generate(
              model_path="mlx-community/mochi-1-preview-4bit-mlx",
              prompt="A cinematic rocket launch with thick smoke and bright fire",
              image_path="input.png",
              width=320,
              height=320,
              num_frames=31,
              steps=6,
              output_path="output.mp4"
          )
          print("Generation Complete!")
          EOF

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochi-video
          path: output.mp4
