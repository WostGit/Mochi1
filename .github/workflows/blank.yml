name: Mochi-1 (6GB Final Logic Fix)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # We force a fresh install of the core MLX video suite
          pip install mlx-video mlx huggingface_hub Pillow tqdm

      - name: Prepare Asset
        run: |
          curl -L -o raw.png "https://huggingface.co/datasets/huggingface/documentation-images/resolve/main/diffusers/svd/rocket.png"
          python3 -c "from PIL import Image; Image.open('raw.png').convert('RGB').resize((320, 320)).save('input.png')"

      - name: Inference (Mochi-1 6GB Optimization)
        run: |
          python3 << 'EOF'
          import mlx_video
          import sys
          
          # 1. Inspect the library to find the right tool
          print(f"MLX-Video Version: {getattr(mlx_video, '__version__', 'unknown')}")
          print(f"Available in mlx_video: {dir(mlx_video)}")
          
          # 2. Attempt the 2026 Standard Import
          try:
              from mlx_video import generate
              print("Using standard top-level generate.")
          except ImportError:
              try:
                  from mlx_video.utils import generate
                  print("Using utils.generate.")
              except ImportError:
                  # Fallback to the specific model loader if top-level fails
                  from mlx_video.models.mochi import generate
                  print("Using models.mochi.generate.")

          # 3. 6GB RAM Generation
          # We use 320x320 and only 12 frames to ensure the 6GB runner doesn't peak.
          generate(
              model_path="mlx-community/mochi-1-preview-4bit-mlx",
              prompt="A cinematic rocket launch, fire and smoke",
              image_path="input.png",
              width=320,
              height=320,
              num_frames=12, 
              steps=4,
              output_path="output.mp4"
          )
          print("SUCCESS: Video generated.")
          EOF

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rocket-video
          path: output.mp4
