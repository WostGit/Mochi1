name: Mochi-1 (Self-Healing 6GB Fix)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlx-video huggingface_hub Pillow mlx tqdm

      - name: Prepare Assets
        run: |
          curl -L -o raw.png "https://huggingface.co/datasets/huggingface/documentation-images/resolve/main/diffusers/svd/rocket.png"
          python3 -c "from PIL import Image; Image.open('raw.png').convert('RGB').resize((320, 320)).save('input.png')"

      - name: Inference (Self-Healing Script)
        run: |
          python3 << 'EOF'
          import mlx_video
          import inspect
          
          # DISCOVERY PHASE: Find where the generate function lives
          try:
              # Try the most likely 2026 entry point
              from mlx_video import generate
              print("Found 'generate' at root.")
          except ImportError:
              try:
                  from mlx_video.models.mochi import generate
                  print("Found 'generate' in models.mochi.")
              except ImportError:
                  # Last ditch: search all submodules for a function named 'generate'
                  import pkgutil
                  for loader, module_name, is_pkg in pkgutil.walk_packages(mlx_video.__path__, mlx_video.__name__ + "."):
                      try:
                          module = loader.find_module(module_name).load_module(module_name)
                          if hasattr(module, 'generate'):
                              generate = module.generate
                              print(f"Discovered 'generate' in {module_name}")
                              break
                      except:
                          continue
          
          # EXECUTION PHASE: 6GB Safe Settings
          print("Starting Mochi-1 Generation...")
          generate(
              model_path="mlx-community/mochi-1-preview-4bit-mlx",
              prompt="A rocket launch with bright fire, cinematic",
              image_path="input.png",
              width=320,
              height=320,
              num_frames=25, # Reduced slightly for 6GB stability
              steps=6,
              output_path="output.mp4"
          )
          print("Success!")
          EOF

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochi-video
          path: output.mp4
